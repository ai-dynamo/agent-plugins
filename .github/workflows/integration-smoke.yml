name: integration-smoke

# End-to-end check that nvext.agent_context fields emitted by this package
# round-trip through Dynamo's actual frontend + mocker into the agent trace
# sink. Installs the published ai-dynamo wheel (latest including prereleases),
# not raw upstream main — this filters out broken-build commits naturally
# while still tracking what users would actually install.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dynamo_spec:
        description: "pip spec for ai-dynamo (e.g. 'ai-dynamo==1.2.0' or 'git+https://github.com/ai-dynamo/dynamo@<sha>'). Defaults to latest --pre."
        required: false
        default: ""

concurrency:
  group: integration-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  DYNAMO_TEST_MODEL_ID: "Qwen/Qwen3-0.6B"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HuggingFace tokenizer
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-${{ env.DYNAMO_TEST_MODEL_ID }}

      - name: Install npm dependencies
        run: npm ci

      - name: Install Dynamo
        # Use the published wheel rather than building from source. --pre picks
        # up prerelease versions when present so we still track newer-than-tag
        # releases. Wheel install is ~30s vs ~5-10 min cargo build, and a
        # published wheel implies upstream's own CI green-lit the build.
        run: |
          python -m venv "${GITHUB_WORKSPACE}/.dynamo-venv"
          source "${GITHUB_WORKSPACE}/.dynamo-venv/bin/activate"
          python -m pip install --upgrade pip
          spec="${{ inputs.dynamo_spec }}"
          spec="${spec:-ai-dynamo}"
          pip install --pre "${spec}"
          python -c "import dynamo.frontend, dynamo.mocker; print('dynamo import ok')"
          echo "${GITHUB_WORKSPACE}/.dynamo-venv/bin" >>"$GITHUB_PATH"
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.dynamo-venv" >>"$GITHUB_ENV"

      - name: Run integration smoke test
        env:
          SMOKE_KEEP_LOGS: "1"
        run: ./scripts/integration-smoke.sh

      - name: Upload Dynamo logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-smoke-logs-${{ github.run_id }}
          path: |
            /tmp/pi-dynamo-smoke-*/*.log
            /tmp/pi-dynamo-smoke-*/*.jsonl
          retention-days: 7
