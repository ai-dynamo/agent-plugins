name: integration-smoke

# End-to-end check that x-dynamo-session-id emitted by this package
# round-trips through Dynamo's actual frontend + mocker into the request trace
# sink. Builds Dynamo from ai-dynamo/dynamo@main on every run — published
# wheels lag behind features (e.g. the agent_trace sink), so we need source
# builds to test the surface this package actually depends on. Cargo cache
# keeps warm-runs in the ~60-90s range; cold runs ~10 min.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      dynamo_ref:
        description: "ai-dynamo/dynamo git ref (branch, tag, or SHA). Defaults to main."
        required: false
        default: "main"

concurrency:
  group: integration-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  DYNAMO_TEST_MODEL_ID: "Qwen/Qwen3-0.6B"

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pi-plugin/package-lock.json

      - name: Test Pi plugin
        run: |
          npm ci --prefix pi-plugin
          npm run check --prefix pi-plugin
          npm test --prefix pi-plugin
          npm run build --prefix pi-plugin

      - name: Test Hermes plugin
        run: python3 -m unittest discover -s hermes-plugin/tests -p 'test_*.py'

      - name: Test OpenClaw plugin
        run: npm test --prefix openclaw-plugin

  pi-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pi-plugin/package-lock.json

      - name: Test latest Pi API
        run: |
          npm ci --prefix pi-plugin
          npm install --prefix pi-plugin --no-save \
            @mariozechner/pi-ai@latest \
            @mariozechner/pi-coding-agent@latest
          node -e 'for (const name of ["pi-ai", "pi-coding-agent"]) { const p = require(`./pi-plugin/node_modules/@mariozechner/${name}/package.json`); console.log(`${name} ${p.version}`) }'
          npm run check --prefix pi-plugin
          npm test --prefix pi-plugin
          npm run build --prefix pi-plugin

  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        hermes: ["a7983d5ad768551508667e8c708e13def7ee28ab", "main"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Checkout Hermes ${{ matrix.hermes }}
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/NousResearch/hermes-agent.git hermes-agent
          git -C hermes-agent fetch --depth 1 origin "${{ matrix.hermes }}"
          git -C hermes-agent checkout --detach FETCH_HEAD
          git -C hermes-agent log -1 --oneline

      - name: Install Hermes
        run: uv sync --project hermes-agent --no-dev

      - name: Test real plugin loader and AIAgent contract
        run: |
          state_dir=$(mktemp -d)
          mkdir -p "$state_dir/plugins"
          ln -s "$GITHUB_WORKSPACE/hermes-plugin" "$state_dir/plugins/dynamo_session"
          HERMES_HOME="$state_dir" uv run --project hermes-agent --no-sync \
            hermes plugins enable dynamo_session
          HERMES_HOME="$state_dir" uv run --project hermes-agent --no-sync \
            hermes plugins list --enabled --no-bundled --plain | grep -q dynamo_session
          HERMES_HOME="$state_dir" uv run --project hermes-agent --no-sync \
            python "$GITHUB_WORKSPACE/hermes-plugin/tests/upstream_smoke.py"

  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        openclaw: ["2026.6.8", "latest"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenClaw ${{ matrix.openclaw }}
        run: npm install --global openclaw@${{ matrix.openclaw }}

      - name: Test plugin
        env:
          OPENCLAW_TEST_VERSION: ${{ matrix.openclaw }}
        run: |
          openclaw --version
          npm run test:runtime --prefix openclaw-plugin

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Dynamo ref
        id: dynamo
        # Capture both the ref label and the resolved HEAD SHA. The SHA goes
        # into the cargo cache key so each new dynamo HEAD gets a fresh exact
        # key (preventing cache staleness as upstream moves forward); the ref
        # label drives restore-keys for partial-warmth fallback from any prior
        # SHA on the same ref.
        run: |
          ref="${{ inputs.dynamo_ref }}"
          ref="${ref:-main}"
          sha=$(git ls-remote https://github.com/ai-dynamo/dynamo.git "${ref}" | awk '{print $1}' | head -c 12)
          if [[ -z "${sha}" ]]; then sha="$(echo "${ref}" | tr -c '[:alnum:]' '-')"; fi
          echo "ref=${ref}" >>"$GITHUB_OUTPUT"
          echo "sha=${sha}" >>"$GITHUB_OUTPUT"
          echo "Resolved ${ref} -> ${sha}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pi-plugin/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dynamo/target
          # Exact key includes the resolved dynamo SHA so every upstream HEAD
          # gets its own cache entry. Restore-keys falls back to any prior SHA
          # on the same ref (cargo incremental still gets most of the benefit
          # from a near-neighbor build), then to any prior build for this OS.
          key: cargo-${{ runner.os }}-${{ steps.dynamo.outputs.ref }}-${{ steps.dynamo.outputs.sha }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ steps.dynamo.outputs.ref }}-
            cargo-${{ runner.os }}-

      - name: Cache HuggingFace tokenizer
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-${{ env.DYNAMO_TEST_MODEL_ID }}

      - name: Install npm dependencies
        working-directory: pi-plugin
        run: npm ci

      - name: Install system build deps
        # protoc is required for the dynamo runtime's prost/tonic build scripts.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Clone Dynamo @ ${{ steps.dynamo.outputs.ref }}
        run: |
          git clone --depth 1 --branch "${{ steps.dynamo.outputs.ref }}" \
            https://github.com/ai-dynamo/dynamo.git dynamo \
            || git clone https://github.com/ai-dynamo/dynamo.git dynamo
          if [[ "${{ steps.dynamo.outputs.ref }}" != "main" ]]; then
            (cd dynamo && git fetch --depth 1 origin "${{ steps.dynamo.outputs.ref }}" && git checkout FETCH_HEAD)
          fi
          (cd dynamo && git log -1 --oneline)

      - name: Install Dynamo from source
        # maturin develop requires an active virtualenv. Create one, activate
        # it, then export it into $GITHUB_PATH so subsequent steps inherit the
        # same python with dynamo importable.
        run: |
          python -m venv "${GITHUB_WORKSPACE}/.dynamo-venv"
          source "${GITHUB_WORKSPACE}/.dynamo-venv/bin/activate"
          python -m pip install --upgrade pip maturin
          (cd dynamo/lib/bindings/python && maturin develop --release)
          pip install -e ./dynamo
          python -c "import dynamo.frontend, dynamo.mocker; print('dynamo import ok')"
          echo "${GITHUB_WORKSPACE}/.dynamo-venv/bin" >>"$GITHUB_PATH"
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.dynamo-venv" >>"$GITHUB_ENV"

      - name: Run integration smoke test
        env:
          SMOKE_KEEP_LOGS: "1"
        run: ./pi-plugin/scripts/integration-smoke.sh

      - name: Upload trace JSONL on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-smoke-trace-${{ github.run_id }}
          path: /tmp/pi-dynamo-smoke-*/*.jsonl
          retention-days: 1

      - name: Upload Dynamo logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-smoke-logs-${{ github.run_id }}
          path: |
            /tmp/pi-dynamo-smoke-*/*.log
            /tmp/pi-dynamo-smoke-*/*.jsonl
          retention-days: 1
